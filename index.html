<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>SMS Backup Explorer</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<div class="container">
		<div class="upload-card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
			<div>
				<div>
					<span>📱</span>
					<h1>SMS Backup Explorer</h1>
				</div>
				<div class="sub">View and browse SMS backups generated by SMS Backup & Restore app - Free and Private</div>
			</div>
			<button class="theme-toggle" id="darkModeToggle">🌙 Dark Mode</button>
		</div>

		<div class="upload-card">
			<label class="file-label" for="smsFileInput">
				📂 Choose XML Backup File
			</label>
			<input type="file" id="smsFileInput" accept=".xml, .txt" />
			<span id="fileStats" class="stats-badge">No file loaded</span>
			<div id="globalInfo" style="font-size:0.8rem; margin-top: 12px;"></div>
		</div>

		<div id="controlsSection" style="display: none;">
			<div class="filter-panel">
				<div class="filter-group">
					<label>📇 CONTACT</label>
					<div class="searchable-select" id="contactSelectWrapper">
						<div class="searchable-select-input" id="selectedContactDisplay">
							<span>📨 ALL CONTACTS</span>
							<span class="dropdown-arrow">▼</span>
						</div>
						<div class="searchable-dropdown" id="contactDropdown">
							<div class="dropdown-search-box">
								<input type="text" id="contactSearchInput" placeholder="🔍 Search by name or number..." autocomplete="off">
							</div>
							<div class="dropdown-items" id="dropdownItemsContainer"></div>
						</div>
					</div>
				</div>
				<div class="filter-group">
					<label>💬 MESSAGE TYPE</label>
					<div class="type-filter">
						<button id="filterAllBtn" class="type-btn all-btn active">📨 All</button>
						<button id="filterSentBtn" class="type-btn sent-btn">📤 Sent Only</button>
						<button id="filterReceivedBtn" class="type-btn received-btn">📩 Received Only</button>
					</div>
				</div>
				<div class="filter-group">
					<label>📅 DATE RANGE</label>
					<div class="date-range">
						<input type="date" id="startDateInput" placeholder="From date">
						<input type="date" id="endDateInput" placeholder="To date">
						<button id="clearDateBtn" class="clear-date-btn">✖ Clear</button>
					</div>
				</div>
				<div class="filter-group">
					<label>🔍 SEARCH</label>
					<input type="text" id="searchInput" placeholder="Keyword in body...">
				</div>
				<div class="filter-group">
					<label>📅 SORT</label>
					<div class="sort-options">
						<button id="sortNewestBtn" class="sort-btn active">⬇ Newest</button>
						<button id="sortOldestBtn" class="sort-btn">⬆ Oldest</button>
					</div>
				</div>
				<div id="resultCountBadge" class="sms-counter">0 messages</div>
			</div>
		</div>

		<div id="messagesList" class="messages-container">
			<div class="no-messages">⬆️ Choose an SMS backup XML file to start.</div>
		</div>
		<footer>Version 1.0 - Developed by: Amirhosain Shahsavari - Github: <a href="https://github.com/amirhosainshahsavari/SMS-Backup-Explorer" target="_blank">@amirhosainshahsavari</a> - <a href="https://opensource.org/licenses/MIT" target="_blank"> Under MIT Lisence</a></footer>
	</div>
	<script src="script.js"></script>
</body>
</html>
